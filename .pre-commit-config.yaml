fail_fast: true
repos:
  - repo: local
    hooks:
      - id: rust-format
        name: Rust format
        description: Run Rust formatting with rustfmt
        entry: just format
        language: system
        types: [file, rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: rust-lint
        name: Rust lint check
        description: Run Rust linting with clippy, including FSDB clippy when Verdi is available
        entry: just lint
        language: system
        types: [file, rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: rust-check
        name: Rust build check
        description: Run Rust build checks with cargo
        entry: just check-build
        language: system
        types: [file, rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: justfile-format-check
        name: justfile format check
        description: Validate root justfile formatting
        entry: just format-justfile-check
        language: system
        files: ^justfile$
        pass_filenames: false
        stages: [pre-commit]

      - id: schema-contract
        name: Schema contract check
        description: Validate canonical schema freshness and URL contract
        entry: just check-schema
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: github-actions-lint
        name: GitHub Actions lint
        description: Run actionlint on GitHub Actions workflows
        entry: just check-actions
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
        stages: [pre-commit]

      - id: rust-test
        name: Rust testing
        description: Run cargo tests, including FSDB tests when Verdi is available
        entry: just test
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: aux-test
        name: Auxiliary test suites
        description: Run bench/e2e, bench/expr, and release-helper unit tests
        entry: just test-aux
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: bench-e2e-smoke-commit
        name: Benchmark E2E pre-commit smoke
        description: Run lightweight bench/e2e smoke, including FSDB smoke when Verdi is available
        entry: just bench-e2e-smoke-commit
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: git-commit-style
        name: Commit style check
        description: Run commitizen to validate commit message
        stages: [commit-msg]
        entry: just check-commit
        pass_filenames: false
        language: system
