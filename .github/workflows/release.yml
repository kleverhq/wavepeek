name: Release CI

on:
  push:
    tags:
      - v*.*.*

permissions:
  actions: write
  contents: write
  packages: write

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-24.04
    env:
      DEVCONTAINER_CACHE_REF: ghcr.io/${{ github.repository_owner }}/wavepeek-devcontainer:buildcache
      DEVCONTAINER_CONFIG: .devcontainer/devcontainer.ci.json
      DEVCONTAINER_CONFIG_ALIAS: .devcontainer/.devcontainer.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR for devcontainer cache
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print runtime provenance
        run: |
          ln -sf devcontainer.ci.json .devcontainer/.devcontainer.json
          echo "devcontainer_config=${DEVCONTAINER_CONFIG}"
          echo "devcontainer_config_alias=${DEVCONTAINER_CONFIG_ALIAS}"
          echo "devcontainer_dockerfile=.devcontainer/Dockerfile"
          sha256sum .devcontainer/Dockerfile

      - name: Validate tag matches Cargo.toml version
        run: python3 -B tools/release/validate_tag_version.py

      - name: Run release quality gate in devcontainer baseline
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/.devcontainer.json
          cacheFrom: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }}
          cacheTo: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }},mode=max
          push: never
          runCmd: just ci

      - name: Build crate package in devcontainer baseline
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/.devcontainer.json
          cacheFrom: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }}
          push: never
          runCmd: cargo package --locked

      - name: Extract release notes from changelog
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          version="${TAG_VERSION#v}"
          python3 -B tools/release/extract_release_notes.py --version "$version" > "${RUNNER_TEMP}/release-notes.md"

      - name: Require crates.io token
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$CRATES_IO_TOKEN" ]; then
            echo "error: secrets.CRATES_IO_TOKEN is required for releases"
            exit 1
          fi

      - name: Publish crate to crates.io
        uses: devcontainers/ci@v0.3
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        with:
          configFile: .devcontainer/.devcontainer.json
          cacheFrom: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }}
          push: never
          env: |
            CARGO_REGISTRY_TOKEN
          runCmd: cargo publish --locked

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ runner.temp }}/release-notes.md

      - name: Dispatch docs publication
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          version="${SOURCE_REF#v}"
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/docs.yml/dispatches" \
            -f ref=main \
            -f inputs[version]="$version" \
            -f inputs[source_ref]="$SOURCE_REF" \
            -F inputs[repair_existing_version]=false
