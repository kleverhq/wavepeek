name: Release CI

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-24.04
    env:
      DEVCONTAINER_CACHE_REF: ghcr.io/${{ github.repository_owner }}/wavepeek-devcontainer:buildcache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR for devcontainer cache
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print runtime provenance
        run: |
          echo "devcontainer_config=.devcontainer/.devcontainer.json"
          echo "devcontainer_dockerfile=.devcontainer/Dockerfile"
          sha256sum .devcontainer/Dockerfile

      - name: Validate tag matches Cargo.toml version
        run: |
          python3 - <<'PY'
          import os
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          if not tag.startswith("v"):
              raise SystemExit(f"error: expected tag that starts with 'v', got {tag!r}")

          tag_version = tag[1:]
          with open("Cargo.toml", "rb") as fh:
              package = tomllib.load(fh)["package"]
          crate_version = package["version"]

          if tag_version != crate_version:
              raise SystemExit(
                  "error: tag version "
                  f"({tag_version}) does not match Cargo.toml version ({crate_version})"
              )

          print(f"tag_version={tag_version}")
          PY

      - name: Run release quality gate in devcontainer baseline
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/.devcontainer.json
          cacheFrom: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }}
          cacheTo: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }},mode=max
          push: never
          runCmd: make ci

      - name: Build crate package in devcontainer baseline
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/.devcontainer.json
          cacheFrom: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }}
          push: never
          runCmd: cargo package --locked

      - name: Extract release notes from changelog
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          version="${TAG_VERSION#v}"
          python3 -B scripts/extract_release_notes.py --version "$version" > "${RUNNER_TEMP}/release-notes.md"

      - name: Require crates.io token
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$CRATES_IO_TOKEN" ]; then
            echo "error: secrets.CRATES_IO_TOKEN is required for releases"
            exit 1
          fi

      - name: Publish crate to crates.io
        uses: devcontainers/ci@v0.3
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        with:
          configFile: .devcontainer/.devcontainer.json
          cacheFrom: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }}
          push: never
          env: |
            CARGO_REGISTRY_TOKEN
          runCmd: cargo publish --locked

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ runner.temp }}/release-notes.md
