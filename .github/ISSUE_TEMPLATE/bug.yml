name: Bug report
description: Report a reproducible bug in wavepeek.
body:
  - type: markdown
    attributes:
      value: |
        **Before you start:** Read [CONTRIBUTING.md](https://github.com/kleverhq/wavepeek/blob/main/CONTRIBUTING.md).

        Issues are only for reproducible bugs and maintainer-created or maintainer-converted work items. Feature requests, ideas, questions, contribution proposals, and direction checks belong in [Discussions](https://github.com/kleverhq/wavepeek/discussions).

        Do not open a PR unless a maintainer has approved the work.

        Keep this short. If it does not fit on one screen, it is too long. Write in your own voice.

  - type: checkboxes
    id: bug-confirmation
    attributes:
      label: Is this a reproducible bug?
      description: Feature requests, ideas, questions, contribution proposals, and direction checks belong in Discussions and may be closed automatically if opened as issues.
      options:
        - label: I confirm this is a reproducible bug, not a feature request, idea, question, contribution proposal, or direction check.
          required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What is happening now?
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: What are the shortest steps that show the problem? Attach relevant files if they matter.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How does this affect you?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Describe your environment.
      value: |
        - wavepeek version:
        - Operating system:
        - FSDB feature: enabled/disabled
    validations:
      required: true
