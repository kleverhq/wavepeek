title: "[idea] "
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea / Problem
      description: What do you want to do, or what feels awkward today?
    validations:
      required: true

  - type: textarea
    id: requested-change
    attributes:
      label: Requested change
      description: What would you like wavepeek to support?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why you want this
      description: How would this help you?
    validations:
      required: true
