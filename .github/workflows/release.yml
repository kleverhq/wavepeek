# This file is based on cargo-dist generated GitHub Actions YAML.
# Regenerate with `dist generate`, then reapply the local policy hooks below:
# stable vX.Y.Z tag validation, devcontainer release gates, rendered release notes,
# and downstream docs/crates.io workflow dispatch on the default branch.

name: Release

permissions:
  contents: write
  actions: write
  packages: write

env:
  CARGO_NET_RETRY: '10'

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Run 'dist host --steps=create' to determine the build matrix and release plan.
  plan:
    runs-on: ubuntu-24.04
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ github.ref_name }}
      tag-flag: ${{ format('--tag={0}', github.ref_name) }}
      version: ${{ steps.validate-tag.outputs.tag_version }}
      publishing: 'true'
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - id: validate-tag
        name: Validate tag matches Cargo.toml version
        run: python3 -B tools/release/validate_tag_version.py >> "$GITHUB_OUTPUT"

      - name: Warm cargo metadata cache
        run: |
          for attempt in 1 2 3 4 5; do
            cargo metadata --locked --format-version=1 > /dev/null && exit 0
            sleep "$((attempt * 10))"
          done
          cargo metadata --locked --format-version=1 > /dev/null

      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh

      - name: Cache dist
        uses: actions/upload-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist

      - id: plan
        run: |
          dist host --steps=create --tag="${{ github.ref_name }}" --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Upload dist-manifest.json
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  release-quality:
    name: Release quality gate
    runs-on: ubuntu-24.04
    needs: plan
    permissions:
      contents: read
      packages: write
    env:
      DEVCONTAINER_CACHE_REF: ghcr.io/${{ github.repository_owner }}/wavepeek-devcontainer:buildcache
      DEVCONTAINER_CONFIG: .devcontainer/devcontainer.ci.json
      DEVCONTAINER_CONFIG_ALIAS: .devcontainer/.devcontainer.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR for devcontainer cache
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print runtime provenance
        run: |
          ln -sf devcontainer.ci.json .devcontainer/.devcontainer.json
          echo "devcontainer_config=${DEVCONTAINER_CONFIG}"
          echo "devcontainer_config_alias=${DEVCONTAINER_CONFIG_ALIAS}"
          echo "devcontainer_dockerfile=.devcontainer/Dockerfile"
          sha256sum .devcontainer/Dockerfile

      - name: Run release quality gate in devcontainer baseline
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/.devcontainer.json
          cacheFrom: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }}
          cacheTo: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }},mode=max
          push: never
          runCmd: |
            just ci
            cargo package --locked

  # Build and package all platform-specific artifacts.
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    needs:
      - plan
      - release-quality
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && needs.plan.outputs.publishing == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: enable windows longpaths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

      - name: Install dist
        run: ${{ matrix.install_dist.run }}

      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}

      - name: Build artifacts
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"

      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: target/distrib/*${{ join(matrix.targets, ', ') }}*

      - id: cargo-dist
        name: Post-build
        shell: bash
        run: |
          { echo "paths<<EOF"; dist print-upload-files-from-manifest --manifest dist-manifest.json; echo "EOF"; } >> "$GITHUB_OUTPUT"
          cp dist-manifest.json "$BUILD_MANIFEST_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package platform-agnostic artifacts such as checksums and installers.
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/

      - run: chmod +x ~/.cargo/bin/dist

      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"
          { echo "paths<<EOF"; jq --raw-output ".upload_files[]" dist-manifest.json; echo "EOF"; } >> "$GITHUB_OUTPUT"
          cp dist-manifest.json "$BUILD_MANIFEST_NAME"

      - name: Attest global artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            target/distrib/sha256.sum
            target/distrib/*.sha256
            target/distrib/source.tar.gz
            target/distrib/wavepeek-installer.sh
            target/distrib/wavepeek-installer.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Upload artifacts and create the GitHub Release.
  host:
    needs:
      - plan
      - release-quality
      - build-local-artifacts
      - build-global-artifacts
    if: ${{ always() && needs.plan.result == 'success' && needs.release-quality.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: ubuntu-22.04
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/

      - run: chmod +x ~/.cargo/bin/dist

      - name: Fetch artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - name: Warm cargo metadata cache
        run: |
          for attempt in 1 2 3 4 5; do
            cargo metadata --locked --format-version=1 > /dev/null && exit 0
            sleep "$((attempt * 10))"
          done
          cargo metadata --locked --format-version=1 > /dev/null

      - id: host
        shell: bash
        run: |
          # cargo-dist writes final hosting metadata here; the GitHub Release is created by gh below.
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Upload dist-manifest.json
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-dist-manifest
          path: dist-manifest.json

      - name: Render release body
        run: python3 -B tools/release/render_release_body.py --version "${{ needs.plan.outputs.version }}" --repository "${{ github.repository }}" --dist-manifest dist-manifest.json --crate-published unknown > "$RUNNER_TEMP/notes.txt"

      - name: Attest dist manifest
        uses: actions/attest@v4
        with:
          subject-path: dist-manifest.json

      - name: Download GitHub Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Cleanup
        run: rm -f artifacts/*-dist-manifest.json

      - name: Create draft GitHub Release
        env:
          RELEASE_COMMIT: ${{ github.sha }}
        run: gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" --title "wavepeek ${{ needs.plan.outputs.version }}" --notes-file "$RUNNER_TEMP/notes.txt" --draft

      - name: Upload GitHub Release assets
        run: gh release upload "${{ needs.plan.outputs.tag }}" --clobber artifacts/*

      - name: Publish GitHub Release
        run: gh release edit "${{ needs.plan.outputs.tag }}" --draft=false

  dispatch-downstream:
    name: Dispatch downstream publication
    needs:
      - plan
      - host
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      VERSION: ${{ needs.plan.outputs.version }}
      SOURCE_REF: ${{ needs.plan.outputs.tag }}
    steps:
      - name: Dispatch docs publication
        run: gh workflow run docs.yml --repo "$GH_REPO" --ref "$DEFAULT_BRANCH" -f version="$VERSION" -f source_ref="$SOURCE_REF" -f repair_existing_version=false

      - name: Dispatch crates.io publication
        run: gh workflow run publish-crate.yml --repo "$GH_REPO" --ref "$DEFAULT_BRANCH" -f version="$VERSION" -f source_ref="$SOURCE_REF"
