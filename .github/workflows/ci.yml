name: Pre-merge CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  checks:
    name: Format, lint, schema, coverage, tests
    runs-on: ubuntu-24.04
    env:
      DEVCONTAINER_CACHE_REF: ghcr.io/${{ github.repository_owner }}/wavepeek-devcontainer:buildcache
      DEVCONTAINER_CONFIG: .devcontainer/devcontainer.ci.json
      DEVCONTAINER_CONFIG_ALIAS: .devcontainer/.devcontainer.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load coverage threshold from Makefile
        run: |
          echo "COVERAGE_SRC_THRESHOLD=$(make -s print-coverage-src-threshold)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR for devcontainer cache
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print runtime provenance
        run: |
          ln -sf devcontainer.ci.json .devcontainer/.devcontainer.json
          echo "devcontainer_config=${DEVCONTAINER_CONFIG}"
          echo "devcontainer_config_alias=${DEVCONTAINER_CONFIG_ALIAS}"
          echo "devcontainer_dockerfile=.devcontainer/Dockerfile"
          sha256sum .devcontainer/Dockerfile

      - name: Run checks in devcontainer baseline (cache write)
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/.devcontainer.json
          cacheFrom: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }}
          cacheTo: |
            type=registry,ref=${{ env.DEVCONTAINER_CACHE_REF }},mode=max
          push: never
          runCmd: COVERAGE_SRC_THRESHOLD=${{ env.COVERAGE_SRC_THRESHOLD }} make ci

      - name: Run checks in devcontainer baseline (cache read-only)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/.devcontainer.json
          push: never
          runCmd: COVERAGE_SRC_THRESHOLD=${{ env.COVERAGE_SRC_THRESHOLD }} make ci

      - name: Summarize source coverage
        if: always()
        run: |
          if [ -f tmp/coverage/coverage-src-summary.md ]; then
            cat tmp/coverage/coverage-src-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "coverage summary markdown was not generated" >> "$GITHUB_STEP_SUMMARY"
          fi
